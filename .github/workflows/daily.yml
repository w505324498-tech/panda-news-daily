name: Panda News Daily

on:
  schedule:
    # Target: ~8:37 AM Beijing. GitHub scheduler adds ~4-5h delay in
    # batch processing, so cron is set earlier to compensate.
    # 20:37 UTC + ~4-5h delay ≈ 00:37-01:37 UTC = 8:37-9:37 AM Beijing
    - cron: "37 20 * * *"
  workflow_dispatch: {}

jobs:
  news-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Panda News Daily
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || secrets.SMTP_USER }}
        run: python -m src.main
