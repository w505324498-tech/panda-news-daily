name: Panda Intelligence Daily

on:
  schedule:
    # Run daily at 8:00 AM Beijing time (UTC+8) = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # Manual trigger

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Panda Intelligence Center
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.deepseek.com' }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'deepseek-chat' }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || '' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || secrets.SMTP_USER }}
        run: python -m src.main
