# RSS feeds for Panda News Daily
# Failed feeds are skipped automatically with a warning.

ai_news:
  - name: "Hacker News AI"
    url: "https://hnrss.org/frontpage?q=AI+OR+LLM+OR+GPT+OR+Claude+OR+OpenAI"
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
  - name: "The Verge AI"
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
  - name: "ArXiv AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
  - name: "MIT Tech Review AI"
    url: "https://www.technologyreview.com/topic/artificial-intelligence/feed/"

# China news from international sources — avoids state-media echo chamber,
# surfaces analytical, policy, and societal coverage from outside perspectives.
china_news:
  - name: "SCMP News"
    url: "https://www.scmp.com/rss/4/feed"
  - name: "BBC China"
    url: "https://feeds.bbci.co.uk/news/world/asia/china/rss.xml"
  - name: "The Diplomat"
    url: "https://thediplomat.com/feeds/"
  - name: "Sixth Tone"
    url: "https://www.sixthtone.com/rss"
  - name: "NYT Asia Pacific"
    url: "https://rss.nytimes.com/services/xml/rss/nyt/AsiaPacific.xml"

world_news:
  - name: "BBC World"
    url: "https://feeds.bbci.co.uk/news/world/rss.xml"
  - name: "NYT World"
    url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
  - name: "The Guardian World"
    url: "https://www.theguardian.com/world/rss"
  - name: "NPR World"
    url: "https://feeds.npr.org/1004/rss.xml"

# Global market news — coverage of US, Asia, and European markets.
# Chinese domestic financial mouthpieces removed; replaced with
# international outlets that cover China/Asia markets independently.
stock_news:
  - name: "MarketWatch"
    url: "https://feeds.marketwatch.com/marketwatch/topstories"
  - name: "WSJ Markets"
    url: "https://feeds.a.dj.com/rss/RSSMarketsMain.xml"
  - name: "CNBC Top News"
    url: "https://www.cnbc.com/id/100003114/device/rss/rss.html"
  - name: "Nikkei Asia"
    url: "https://asia.nikkei.com/rss/feed/nar"
